<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Flipbook</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- LIBS -->
  <script src="lib/jquery.min.js"></script>
  <script src="lib/turn.min.js"></script>
</head>

<body>

<div id="viewer">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <button onclick="prevPage()">⟵</button>
    <button onclick="nextPage()">⟶</button>
    <button onclick="zoomIn()">＋</button>
    <button onclick="zoomOut()">－</button>
  </div>

  <!-- BOOK (ONLY ONE!) -->
  <div id="book">

    <div class="page"><img src="images/0.jpg"></div>
    <div class="page"><img src="images/1.jpg"></div>
    <div class="page"><img src="images/2.jpg"></div>
    <div class="page"><img src="images/3.jpg"></div>
    <div class="page"><img src="images/4.jpg"></div>
    <div class="page"><img src="images/5.jpg"></div>
    <div class="page"><img src="images/6.jpg"></div>
    <div class="page"><img src="images/7.jpg"></div>

  </div>

  <!-- PAGE NUMBER -->
  <div id="page-number">Page 1</div>

</div>

<!-- MAIN JS -->
<script src="main.js"></script>

</body>
</html>
